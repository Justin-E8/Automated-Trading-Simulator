spring:
  application:
    name: automated-trading-simulator
  datasource:
    url: jdbc:h2:mem:trading-sim;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8080

market-data:
  default-provider: alphavantage
  alphavantage:
    api-key: ${ALPHA_VANTAGE_API_KEY:}
